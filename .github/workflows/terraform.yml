---
name: Terraform
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  module-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@313f07f46b44c4f3c82e878d71dc3182a0ce3c3d # main
    name: Module Validation
    with:
      working-directory: .

  shared-module-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@313f07f46b44c4f3c82e878d71dc3182a0ce3c3d # main
    name: Shared Module Validation
    with:
      working-directory: modules/shared

  nacls-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@313f07f46b44c4f3c82e878d71dc3182a0ce3c3d # main
    name: NACLS Validation
    with:
      working-directory: modules/nacls
