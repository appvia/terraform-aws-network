---
name: Terraform
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  module-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@d356de2a6df8c4d482880e54a2a6255fdb2cf921 # main
    name: Module Validation
    with:
      working-directory: .

  shared-module-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@d356de2a6df8c4d482880e54a2a6255fdb2cf921 # main
    name: Shared Module Validation
    with:
      working-directory: modules/shared

  nacls-validation:
    uses: appvia/appvia-cicd-workflows/.github/workflows/terraform-module-validation.yml@d356de2a6df8c4d482880e54a2a6255fdb2cf921 # main
    name: NACLS Validation
    with:
      working-directory: modules/nacls
